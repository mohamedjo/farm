spring.application.name=farm
server.port=8081

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8181/realms/livestock}

farm.security.keycloak.client-id=${KEYCLOAK_CLIENT_ID:farm-client}

# ---- Database (PostgreSQL) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/farm?reWriteBatchedInserts=true
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- Kafka ----
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:farm-service}
spring.kafka.consumer.auto-offset-reset=earliest

farm.kafka.topics.farm-created=${KAFKA_TOPIC_FARM_CREATED:farm.farm.created}
logging.level.org.apache.kafka=ERROR
logging.level.org.apache.kafka.clients.NetworkClient=ERROR

# ---- Jackson 3 (Spring Boot 4) ----
spring.jackson.datatype.datetime.write-dates-as-timestamps=false

# ---- OpenAPI / Swagger UI (springdoc) ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ---- OpenAPI content ----
farm.openapi.title=Farm service API
farm.openapi.version=0.0.1
farm.openapi.contact-name=Shabic Farm
farm.openapi.server-url=http://localhost:8081
farm.openapi.server-description=Local
farm.openapi.tag-farms-name=Farms
farm.openapi.tag-farms-description=Register, update, list, and delete farms
farm.openapi.example-register-full-name=Full example
farm.openapi.example-register-minimal-name=Minimal
farm.openapi.example-update-name=Full update
farm.openapi.response-farm-id-example=990e8400-e29b-41d4-a716-446655440099
farm.openapi.description=REST API for farms: register, update, list, get by id, and delete.

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
